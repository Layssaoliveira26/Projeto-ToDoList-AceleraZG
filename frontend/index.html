<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="carregarEdicao()">
    <div class="menu">
        <a href="index.html">Cadastro</a>
        <a href="listaTarefas.html">Listagem Tarefas</a>
    </div>
    <div class="main-area">
        <div class="form-area">
            <form onsubmit="salvarTarefa(event)">
                <h3>Cadastro de Tarefa</h3>
                <div>
                    <label>Título:</label>
                    <input type="text" id="tituloTarefa">
                </div>
                <div>
                    <label>Descrição:</label>
                    <input type="text" id="descricaoTarefa">
                </div>
                <div>
                    <label>Data de Término:</label>
                    <input type="date" id="dataTerminoTarefa">
                </div>
                <div>
                    <label>Categoria:</label>
                    <input type="text" id="categoriaTarefa">
                </div>
                <div>
                    <label>Status</label>
                    <select name="" id="statusTarefa">
                        <option value="">A fazer</option>
                        <option value="">Fazendo</option>
                        <option value="">Finalizada</option>
                    </select>
                </div>
                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </div>
<script src="main.js"></script>
</body>
</html>
